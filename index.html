<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher Command Center | Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg:#09090b; --panel:rgba(24,24,27,0.7); --border:rgba(255,255,255,0.1); --text:#f8fafc; --muted:#a1a1aa; --accent:#3b82f6; --success:#10b981; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); background-image: radial-gradient(circle at top right, rgba(59,130,246,0.1), transparent 400px); color: var(--text); padding: 1.5rem; min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1.5fr 1fr; gap: 1.5rem; }
        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { margin: 0; font-size: 1.5rem; letter-spacing: -0.5px; }
        h2 { font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.8rem; margin: 1.5rem 0 1rem; }
        .sync-badge { font-size: 0.75rem; color: var(--success); background: rgba(16,185,129,0.1); padding: 4px 10px; border-radius: 999px; border: 1px solid rgba(16,185,129,0.2); }
        .timer-display { text-align: center; padding: 1rem 0; }
        .time { font-size: 4.5rem; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -2px; }
        .time.running { color: var(--accent); text-shadow: 0 0 20px rgba(59,130,246,0.4); }
        .btn-giant { background: var(--text); color: #000; border: none; padding: 1rem; font-size: 1.1rem; font-weight: bold; border-radius: 12px; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn-giant.running { background: rgba(255,255,255,0.1); color: var(--text); }
        .card { background: rgba(39,39,42,0.4); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 0.8rem; display: flex; justify-content: space-between; align-items: center; }
        .card.done { opacity: 0.4; }
        .item-main { display: flex; flex-direction: column; gap: 0.2rem; }
        .item-title { font-weight: 600; }
        .item-sub { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; font-weight: bold; }
        .btn-check { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
        .btn-check.done { background: var(--success); border-color: var(--success); color: #000; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <header style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Higher Roadmap</h1>
            <div class="sync-badge">Live Synced</div>
        </header>
        
        <h2>Study Schedule (3h Blocks)</h2>
        <div id="tasksList"></div>
    </div>

    <div style="display:flex; flex-direction:column; gap:1.5rem;">
        <div class="panel">
            <div class="timer-display">
                <div class="time" id="timerDisplay">03:00:00</div>
            </div>
            <button id="toggleTimerBtn" class="btn-giant">▶ Start Timer</button>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:0.5rem; margin-top:1rem;">
                <button onclick="setCustomTimer(25)" style="background:none; border:1px solid var(--border); color:var(--muted); padding:0.5rem; border-radius:8px; cursor:pointer;">25m Pom</button>
                <button onclick="setCustomTimer(180)" style="background:none; border:1px solid var(--border); color:var(--muted); padding:0.5rem; border-radius:8px; cursor:pointer;">3h Exam</button>
            </div>
        </div>

        <div class="panel">
            <h2>Exam Countdown</h2>
            <div id="examsList"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBojGtfnEB3aj4my_QBRBD5rTrshSXTjag", authDomain: "higherexams.firebaseapp.com", projectId: "higherexams" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore().collection('studyData').doc('premiumState');

    // EXAMS
    const exams = [
        { name: 'English (RUAE & Critical)', date: new Date('2026-05-01') },
        { name: 'Mathematics (P1 & P2)', date: new Date('2026-05-07') },
        { name: 'Chemistry (MC & P2)', date: new Date('2026-05-12') },
        { name: 'Computing Science', date: new Date('2026-05-20') },
        { name: 'Physics (MC & P2)', date: new Date('2026-05-21') }
    ];

    // FULL STUDY TIMETABLE
    const initialTasks = [
        { id: 't1', date: 'Apr 22', title: 'English: Essay Adaptation', done: false },
        { id: 't2', date: 'Apr 23', title: 'English: RUAE Past Paper', done: false },
        { id: 't3', date: 'Apr 24', title: 'Maths: Non-Calc Drills', done: false },
        { id: 't4', date: 'Apr 25', title: 'English: Quote Bank Memory', done: false },
        { id: 't5', date: 'Apr 26', title: 'Chemistry: Data Booklet Master', done: false },
        { id: 't6', date: 'Apr 27', title: 'English: Full Essay Timed', done: false },
        { id: 't7', date: 'Apr 28', title: 'Computing: Web/DB Design', done: false },
        { id: 't8', date: 'Apr 29', title: 'Physics: Formula Focus', done: false },
        { id: 't9', date: 'Apr 30', title: 'English: Final Review', done: false },
        { id: 't10', date: 'May 2', title: 'Maths: Heavy Calculator Qs', done: false },
        { id: 't11', date: 'May 3', title: 'Chemistry: Multiple Choice', done: false },
        { id: 't12', date: 'May 4', title: 'Maths: Past Paper Practice', done: false },
        { id: 't13', date: 'May 5', title: 'Maths: SQA Logic Analysis', done: false },
        { id: 't14', date: 'May 6', title: 'Maths: Final P2 Review', done: false }
    ];

    let state = JSON.parse(localStorage.getItem('premiumState')) || { timerRunning: false, timeLeft: 10800, tasks: initialTasks };

    function save() { 
        localStorage.setItem('premiumState', JSON.stringify(state)); 
        db.set(state).catch(() => {}); 
    }

    db.onSnapshot(doc => { if (doc.exists) { state = doc.data(); renderAll(); } });

    function formatTime(s) {
        const h = String(Math.floor(s/3600)).padStart(2, '0');
        const m = String(Math.floor((s%3600)/60)).padStart(2, '0');
        const sc = String(s%60).padStart(2, '0');
        return `${h}:${m}:${sc}`;
    }

    function renderTimer() {
        let left = state.timeLeft;
        if (state.timerRunning && state.lastStartMs) {
            left = Math.max(0, state.timeLeft - Math.floor((Date.now() - state.lastStartMs)/1000));
        }
        const disp = document.getElementById('timerDisplay');
        disp.textContent = formatTime(left);
        disp.className = state.timerRunning ? 'time running' : 'time';
        document.getElementById('toggleTimerBtn').textContent = state.timerRunning ? '⏸ Pause' : '▶ Start Study';
    }

    function renderTasks() {
        document.getElementById('tasksList').innerHTML = state.tasks.map(t => `
            <div class="card ${t.done ? 'done' : ''}">
                <div class="item-main"><span class="item-sub">${t.date}</span><span class="item-title">${t.title}</span></div>
                <button onclick="toggleTask('${t.id}')" class="btn-check ${t.done ? 'done' : ''}">${t.done ? '✓' : 'Done'}</button>
            </div>
        `).join('');
    }

    function renderExams() {
        const today = new Date();
        today.setHours(0,0,0,0); // Strip time for clean day count
        document.getElementById('examsList').innerHTML = exams.map(e => {
            const examDate = new Date(e.date);
            examDate.setHours(0,0,0,0);
            const diff = Math.round((examDate - today) / (1000*60*60*24));
            if (diff < 0) return '';
            return `<div class="card"><div class="item-main"><span>${e.name}</span></div><div style="font-weight:800; color:${diff <= 7 ? 'var(--accent)' : 'var(--text)'}">${diff === 0 ? 'TODAY' : diff + ' Days'}</div></div>`;
        }).join('');
    }

    function renderAll() { renderTimer(); renderTasks(); renderExams(); }

    document.getElementById('toggleTimerBtn').onclick = () => {
        if (state.timerRunning) {
            state.timeLeft -= Math.floor((Date.now() - state.lastStartMs)/1000);
            state.timerRunning = false;
        } else {
            state.lastStartMs = Date.now();
            state.timerRunning = true;
        }
        save(); renderTimer();
    };

    window.setCustomTimer = (m) => { state.timerRunning = false; state.timeLeft = m*60; save(); renderTimer(); };
    window.toggleTask = (id) => { const t = state.tasks.find(x => x.id === id); if(t) { t.done = !t.done; save(); renderTasks(); } };

    setInterval(() => { if (state.timerRunning) renderTimer(); }, 1000);
    renderAll();
</script>
</body>
</html>
