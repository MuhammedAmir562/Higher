<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Higher Planner</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #09090b; --surface: #18181b; --text: #fafafa; --muted: #a1a1aa; --accent: #3b82f6; --success: #10b981; --border: #27272a; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 1rem; line-height: 1.5; }
        .container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }
        
        /* Clean Header */
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        h1 { margin: 0; font-size: 1.2rem; font-weight: 600; }
        .sync-dot { height: 8px; width: 8px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 6px; }
        .sync-status { font-size: 0.8rem; color: var(--muted); display: flex; align-items: center; }

        /* The Giant Timer */
        .timer-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; text-align: center; }
        .time { font-size: 4rem; font-weight: 800; font-variant-numeric: tabular-nums; margin: 0; letter-spacing: -2px; }
        .btn-giant { background: var(--text); color: var(--bg); border: none; padding: 1rem 2rem; font-size: 1.1rem; font-weight: bold; border-radius: 8px; width: 100%; margin-top: 1rem; cursor: pointer; }
        .btn-giant.running { background: var(--border); color: var(--text); }

        /* Simple Lists */
        h2 { font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin: 0 0 0.8rem 0; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        .list-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 0.8rem; display: flex; justify-content: space-between; align-items: center; }
        .list-item.done { opacity: 0.5; text-decoration: line-through; }
        .item-main { display: flex; flex-direction: column; gap: 0.2rem; }
        .item-title { font-weight: 600; font-size: 1.1rem; }
        .item-sub { color: var(--muted); font-size: 0.85rem; }
        
        .btn-check { background: transparent; border: 2px solid var(--border); color: var(--text); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-check.done { background: var(--success); border-color: var(--success); color: #000; text-decoration: none; }
        
        /* Progress */
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 0.5rem; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Higher Exams: 3h Daily</h1>
        <div class="sync-status"><span class="sync-dot"></span><span id="syncText">Syncing...</span></div>
    </header>

    <section class="timer-card">
        <div style="color: var(--muted); font-size: 0.9rem; margin-bottom: 0.5rem;">Daily 3-Hour Focus Block</div>
        <div class="time" id="timerDisplay">03:00:00</div>
        <button id="toggleTimerBtn" class="btn-giant">▶ Start Studying</button>
        <button id="resetTimerBtn" style="background:transparent; border:none; color:var(--muted); margin-top:1rem; cursor:pointer; text-decoration:underline;">Reset Timer</button>
    </section>

    <section>
        <h2>The Roadmap</h2>
        <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
        <div style="font-size: 0.8rem; color: var(--muted); margin: 0.5rem 0 1rem 0; text-align: right;" id="progressText">0/0 Done</div>
        <div id="missionsList"></div>
    </section>

    <section>
        <h2>Upcoming Exams</h2>
        <div id="examsList"></div>
    </section>
</div>

<script>
    // --- FIREBASE CONFIG (LOCKED IN) ---
    const firebaseConfig = {
        apiKey: "AIzaSyBojGtfnEB3aj4my_QBRBD5rTrshSXTjag",
        authDomain: "higherexams.firebaseapp.com",
        projectId: "higherexams"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore().collection('studyData').doc('minimalState');

    // --- HARDCODED DATA (Basic Basics) ---
    const GOAL_SECONDS = 3 * 60 * 60; // 3 Hours
    
    const initialMissions = [
        { id: 'm1', date: 'Apr 22', title: 'English: Essay Adaptation', done: false },
        { id: 'm2', date: 'Apr 23', title: 'English: RUAE Past Paper', done: false },
        { id: 'm3', date: 'Apr 24', title: 'Maths: Non-Calc Drills', done: false },
        { id: 'm4', date: 'Apr 25', title: 'English: Quote Bank', done: false },
        { id: 'm5', date: 'Apr 26', title: 'Chemistry: Data Booklet', done: false },
        { id: 'm6', date: 'Apr 27', title: 'English: Full Essay Timed', done: false },
        { id: 'm7', date: 'Apr 28', title: 'Computing: Web/DB', done: false },
        { id: 'm8', date: 'Apr 29', title: 'Physics: Formulas', done: false },
        { id: 'm9', date: 'Apr 30', title: 'English: Final Review', done: false },
        { id: 'm10', date: 'May 2', title: 'Maths: Heavy Calc Qs', done: false },
        { id: 'm11', date: 'May 3', title: 'Chemistry: Multiple Choice', done: false },
        { id: 'm12', date: 'May 4', title: 'Maths: Past Paper', done: false },
        { id: 'm13', date: 'May 5', title: 'Maths: SQA Logic', done: false },
        { id: 'm14', date: 'May 6', title: 'Maths: Final Review', done: false }
    ];

    const exams = [
        { subject: 'English', date: new Date('2026-05-01T09:00:00') },
        { subject: 'Mathematics', date: new Date('2026-05-07T09:00:00') },
        { subject: 'Chemistry', date: new Date('2026-05-12T09:00:00') },
        { subject: 'Computing', date: new Date('2026-05-20T09:00:00') },
        { subject: 'Physics', date: new Date('2026-05-21T09:00:00') }
    ];

    // --- APP STATE ---
    let state = JSON.parse(localStorage.getItem('minState')) || { 
        timerRunning: false, 
        timeLeft: GOAL_SECONDS, 
        lastStartMs: null, 
        missions: initialMissions 
    };

    // --- CORE LOGIC ---
    function saveAndSync() {
        localStorage.setItem('minState', JSON.stringify(state));
        db.set(state).catch(e => console.log("Offline mode"));
    }

    db.onSnapshot(doc => {
        if (doc.exists) { state = doc.data(); renderAll(); }
        document.getElementById('syncText').textContent = "Live Synced";
    });

    function formatTime(secs) {
        const s = Math.max(0, Math.floor(secs));
        const h = String(Math.floor(s / 3600)).padStart(2, '0');
        const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
        const sc = String(s % 60).padStart(2, '0');
        return `${h}:${m}:${sc}`;
    }

    // --- RENDERERS ---
    function renderTimer() {
        let currentLeft = state.timeLeft;
        if (state.timerRunning && state.lastStartMs) {
            const elapsed = Math.floor((Date.now() - state.lastStartMs) / 1000);
            currentLeft = Math.max(0, state.timeLeft - elapsed);
        }
        
        document.getElementById('timerDisplay').textContent = formatTime(currentLeft);
        const btn = document.getElementById('toggleTimerBtn');
        btn.textContent = state.timerRunning ? '⏸ Pause Timer' : '▶ Start Studying';
        btn.className = state.timerRunning ? 'btn-giant running' : 'btn-giant';
    }

    function renderMissions() {
        const list = document.getElementById('missionsList');
        list.innerHTML = state.missions.map(m => `
            <div class="list-item ${m.done ? 'done' : ''}">
                <div class="item-main">
                    <span class="item-sub">${m.date}</span>
                    <span class="item-title">${m.title}</span>
                </div>
                <button onclick="toggleMission('${m.id}')" class="btn-check ${m.done ? 'done' : ''}">
                    ${m.done ? '✓ Done' : 'Complete'}
                </button>
            </div>
        `).join('');

        const doneCount = state.missions.filter(m => m.done).length;
        const total = state.missions.length;
        document.getElementById('progressBar').style.width = `${(doneCount/total)*100}%`;
        document.getElementById('progressText').textContent = `${doneCount}/${total} Blocks Completed`;
    }

    function renderExams() {
        const list = document.getElementById('examsList');
        const today = new Date();
        list.innerHTML = exams.map(e => {
            const days = Math.ceil((e.date - today) / (1000 * 60 * 60 * 24));
            if (days < 0) return ''; // Hide past exams
            return `
                <div class="list-item">
                    <span class="item-title">${e.subject}</span>
                    <span style="font-weight:bold; color:${days <= 7 ? 'var(--accent)' : 'var(--text)'}">
                        ${days === 0 ? 'TODAY' : days + ' days'}
                    </span>
                </div>
            `;
        }).join('');
    }

    function renderAll() { renderTimer(); renderMissions(); renderExams(); }

    // --- ACTIONS ---
    document.getElementById('toggleTimerBtn').onclick = () => {
        if (state.timerRunning) {
            state.timeLeft -= Math.floor((Date.now() - state.lastStartMs) / 1000);
            state.timerRunning = false;
        } else {
            state.lastStartMs = Date.now();
            state.timerRunning = true;
        }
        saveAndSync();
        renderTimer();
    };

    document.getElementById('resetTimerBtn').onclick = () => {
        state.timerRunning = false;
        state.timeLeft = GOAL_SECONDS;
        saveAndSync();
        renderTimer();
    };

    window.toggleMission = (id) => {
        const mission = state.missions.find(m => m.id === id);
        if (mission) { mission.done = !mission.done; saveAndSync(); renderMissions(); }
    };

    // Keep timer ticking visually
    setInterval(() => { if (state.timerRunning) renderTimer(); }, 1000);

    // Initial render
    renderAll();
</script>
</body>
</html>
